# Habilitar la pantalla OLED
CONFIG_ZMK_DISPLAY=n

# Opcional: si tu pantalla muestra colores invertidos, prueba:
# CONFIG_SSD1306_REVERSE_MODE=y
CONFIG_ZMK_DISPLAY_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=15000
# Encoders
CONFIG_EC11=y

# RGB (sigue comentado si no lo usas)
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_LED_STRIP=n
CONFIG_ZMK_BACKLIGHT=n
